replicaCount: 1

image:
  repository: api-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

serviceMonitor:
  enabled: true
  interval: 30s
  path: /actuator/prometheus

networkPolicy:
  enabled: true

env:
  USER_SERVICE_URL: "http://user-service:8081"
  ARTICLE_SERVICE_URL: "http://article-service:8082"
  COMMENT_SERVICE_URL: "http://comment-service:8083"
