replicaCount: 2

image:
  repository: auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: auth.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "15-alpine"
  auth:
    database: auth
    username: auth
    password: authpass
  storage:
    size: 5Gi
    storageClassName: gp2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

jwt:
  secret: "change-me-in-production"
  expiration: 86400

serviceAccount:
  create: true
  name: ""

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
