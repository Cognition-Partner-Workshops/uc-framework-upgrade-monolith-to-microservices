apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: article-service-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Cognition-Partner-Workshops/uc-framework-upgrade-monolith-to-microservices.git
    targetRevision: main
    path: helm/article-service
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: decomposition-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
