version: '3.8'

services:
  comments-service:
    build:
      context: ./comments-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/comments?articleId=health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  monolith:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - COMMENTS_SERVICE_URL=http://comments-service:8081
      - SPRING_APPLICATION_JSON={"comments.service.url":"http://comments-service:8081"}
    depends_on:
      comments-service:
        condition: service_healthy
