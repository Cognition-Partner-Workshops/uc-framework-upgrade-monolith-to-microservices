version: '3.8'

services:
  comments-service:
    build:
      context: ./comments-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/comments-db
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
    volumes:
      - comments-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8081/api/comments?articleId=health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  monolith:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - COMMENTS_SERVICE_URL=http://comments-service:8081
    depends_on:
      comments-service:
        condition: service_healthy

volumes:
  comments-data:
