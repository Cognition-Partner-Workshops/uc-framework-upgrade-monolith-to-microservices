version: '3.8'

services:
  comments-service:
    build:
      context: ./comments-microservice
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/comments-db
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
    volumes:
      - comments-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/comments/article/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  monolith:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - COMMENTS_SERVICE_URL=http://comments-service:8081
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/data/dev.db
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.sqlite.JDBC
    volumes:
      - monolith-data:/data
    depends_on:
      comments-service:
        condition: service_started

volumes:
  comments-data:
  monolith-data:
