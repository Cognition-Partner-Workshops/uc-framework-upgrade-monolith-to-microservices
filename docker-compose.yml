version: '3.8'

services:
  monolith:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ARTICLE_SERVICE_URL=http://article-service:8081
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/dev.db
    depends_on:
      article-service:
        condition: service_started
    volumes:
      - monolith-data:/app/data

  article-service:
    build:
      context: ./article-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:articledb;DB_CLOSE_DELAY=-1
      - SERVER_PORT=8081

volumes:
  monolith-data:
