version: '3.8'

services:
  monolith:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - COMMENTS_SERVICE_URL=http://comments-service:8081
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/dev.db
    depends_on:
      comments-service:
        condition: service_started

  comments-service:
    build:
      context: ./comments-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:commentsdb
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
