version: '3.8'

services:
  monolith:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - ARTICLE_SERVICE_URL=http://article-service:8081
    volumes:
      - monolith-data:/app/data
    networks:
      - app-network
    depends_on:
      article-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  article-service:
    build:
      context: .
      dockerfile: article-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - article-data:/app/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  monolith-data:
  article-data:

networks:
  app-network:
    driver: bridge
