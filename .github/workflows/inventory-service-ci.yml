name: Inventory Service CI/CD

on:
  push:
    branches:
      - main
      - workshop-*
    paths:
      - 'inventory-service/**'
      - '.github/workflows/inventory-service-ci.yml'
  pull_request:
    branches:
      - main
      - workshop-*
    paths:
      - 'inventory-service/**'
      - '.github/workflows/inventory-service-ci.yml'

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/inventory-service

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventory-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: inventory-service/TestResults

  frontend-build:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventory-service/ClientApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: inventory-service/ClientApp/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: inventory-service/ClientApp/dist

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend-build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./inventory-service
          file: ./inventory-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: helm lint inventory-service/helm/inventory-service

      - name: Template Helm chart (dev)
        run: |
          helm template inventory-service-dev \
            inventory-service/helm/inventory-service \
            -f inventory-service/argocd/dev/values-dev.yaml \
            --namespace inventory-dev

      - name: Template Helm chart (staging)
        run: |
          helm template inventory-service-staging \
            inventory-service/helm/inventory-service \
            -f inventory-service/argocd/staging/values-staging.yaml \
            --namespace inventory-staging

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [docker-build, helm-lint]
    if: github.ref == 'refs/heads/workshop-Gagan' || github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Deploying inventory-service to dev environment"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "ArgoCD will auto-sync from the repository"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Deploying inventory-service to staging environment"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "ArgoCD will auto-sync from the repository"
