server.port=8082

spring.datasource.url=jdbc:sqlite:article-dev.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

image.default=https://static.productionready.io/images/smiley-cyrus.jpg

jwt.secret=${JWT_SECRET:changeme-use-env-variable-in-production}
jwt.sessionTime=86400

user-service.url=http://localhost:8081

mybatis.configuration.cache-enabled=true
mybatis.configuration.default-statement-timeout=3000
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-generated-keys=true
mybatis.type-handlers-package=io.spring.infrastructure.mybatis
mybatis.mapper-locations=classpath*:mapper/*.xml

logging.level.io.spring.infrastructure.mybatis=DEBUG
