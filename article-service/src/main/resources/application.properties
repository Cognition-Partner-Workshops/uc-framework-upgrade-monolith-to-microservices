server.port=8081

# SQLite DataSource
spring.datasource.url=jdbc:sqlite:article-dev.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-handlers-package=io.spring.article.config

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.io.spring.article=DEBUG
