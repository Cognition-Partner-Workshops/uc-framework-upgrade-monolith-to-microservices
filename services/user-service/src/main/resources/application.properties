server.port=8081
spring.application.name=user-service

# Database
spring.datasource.url=jdbc:sqlite:user-service.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-handlers-package=io.spring.userservice.infrastructure.mybatis
mybatis.configuration.map-underscore-to-camel-case=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=nRvyYC4soFxBdZ-F-5Nnzz5USXstR1YylsTd-mA0aKtI9HUlriGrtkf-TiuDapkLiUCogO3JOK7kwZisrHp6wA
jwt.sessionTime=86400

# Default image
image.default=https://static.productionready.io/images/smiley-cyrus.jpg

# Actuator
management.endpoints.web.exposure.include=health,info
