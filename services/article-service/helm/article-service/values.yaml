replicaCount: 1

image:
  repository: realworld/article-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8082

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

env: {}

serviceMonitor:
  enabled: true
  interval: 30s
  path: /actuator/prometheus

networkPolicy:
  enabled: true
