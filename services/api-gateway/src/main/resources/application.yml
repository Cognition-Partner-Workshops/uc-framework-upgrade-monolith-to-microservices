server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # User Service routes
        - id: user-registration
          uri: http://localhost:8081
          predicates:
            - Path=/api/users
            - Method=POST
          filters:
            - StripPrefix=1

        - id: user-login
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/login
            - Method=POST
          filters:
            - StripPrefix=1

        - id: current-user
          uri: http://localhost:8081
          predicates:
            - Path=/api/user
          filters:
            - StripPrefix=1

        - id: profiles
          uri: http://localhost:8081
          predicates:
            - Path=/api/profiles/**
          filters:
            - StripPrefix=1

        # Article Service routes
        - id: articles-feed
          uri: http://localhost:8082
          predicates:
            - Path=/api/articles/feed
          filters:
            - StripPrefix=1

        - id: articles
          uri: http://localhost:8082
          predicates:
            - Path=/api/articles, /api/articles/{slug}
          filters:
            - StripPrefix=1

        - id: article-favorite
          uri: http://localhost:8082
          predicates:
            - Path=/api/articles/{slug}/favorite
          filters:
            - StripPrefix=1

        - id: tags
          uri: http://localhost:8082
          predicates:
            - Path=/api/tags
          filters:
            - StripPrefix=1

        # Comment Service routes
        - id: comments
          uri: http://localhost:8083
          predicates:
            - Path=/api/articles/{slug}/comments, /api/articles/{slug}/comments/{id}
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
