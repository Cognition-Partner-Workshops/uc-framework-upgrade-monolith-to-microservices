server.port=8083
spring.application.name=comment-service

# Database
spring.datasource.url=jdbc:sqlite:comment-service.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-handlers-package=io.spring.commentservice.infrastructure.mybatis
mybatis.configuration.map-underscore-to-camel-case=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=nRvyYC4soFxBdZ-F-5Nnzz5USXstR1YylsTd-mA0aKtI9HUlriGrtkf-TiuDapkLiUCogO3JOK7kwZisrHp6wA
jwt.sessionTime=86400

# Inter-service communication
services.user-service.url=http://localhost:8081

# Actuator
management.endpoints.web.exposure.include=health,info
