{{- if or .Values.secrets.connectionString .Values.secrets.jwtSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inventory-service.fullname" . }}-secrets
  labels:
    {{- include "inventory-service.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.connectionString }}
  connectionString: {{ .Values.secrets.connectionString | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  jwtSecret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- end }}
{{- end }}
