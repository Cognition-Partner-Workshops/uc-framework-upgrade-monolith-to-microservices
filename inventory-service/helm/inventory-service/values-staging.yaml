replicaCount: 2

image:
  tag: "staging-latest"

ingress:
  hosts:
    - host: inventory-staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: inventory-staging-tls
      hosts:
        - inventory-staging.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

env:
  ASPNETCORE_ENVIRONMENT: Staging

networkPolicy:
  enabled: true
