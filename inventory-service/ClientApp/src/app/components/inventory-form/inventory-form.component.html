<div class="form-container">
  <h2>{{ isEditMode ? 'Edit' : 'Create' }} Inventory Item</h2>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <div *ngIf="loading" class="loading">Loading...</div>

  <form *ngIf="!loading" (ngSubmit)="onSubmit()" class="inventory-form">
    <div class="form-group">
      <label for="sku">SKU *</label>
      <input
        id="sku"
        type="text"
        [(ngModel)]="formData.sku"
        name="sku"
        required
        [disabled]="isEditMode"
        placeholder="e.g., WDG-003"
      />
    </div>

    <div class="form-group">
      <label for="name">Name *</label>
      <input
        id="name"
        type="text"
        [(ngModel)]="formData.name"
        name="name"
        required
        placeholder="Item name"
      />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        [(ngModel)]="formData.description"
        name="description"
        rows="3"
        placeholder="Item description"
      ></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Category *</label>
        <input
          id="category"
          type="text"
          [(ngModel)]="formData.category"
          name="category"
          required
          list="categoryList"
          placeholder="Category"
        />
        <datalist id="categoryList">
          <option *ngFor="let cat of categories" [value]="cat"></option>
        </datalist>
      </div>

      <div class="form-group" *ngIf="!isEditMode">
        <label for="quantity">Initial Quantity *</label>
        <input
          id="quantity"
          type="number"
          [(ngModel)]="formData.quantity"
          name="quantity"
          required
          min="0"
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="unitPrice">Unit Price *</label>
        <input
          id="unitPrice"
          type="number"
          [(ngModel)]="formData.unitPrice"
          name="unitPrice"
          required
          min="0"
          step="0.01"
        />
      </div>

      <div class="form-group">
        <label for="reorderLevel">Reorder Level</label>
        <input
          id="reorderLevel"
          type="number"
          [(ngModel)]="formData.reorderLevel"
          name="reorderLevel"
          min="0"
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="warehouseLocation">Warehouse Location</label>
        <input
          id="warehouseLocation"
          type="text"
          [(ngModel)]="formData.warehouseLocation"
          name="warehouseLocation"
          placeholder="e.g., A1-01"
        />
      </div>

      <div class="form-group">
        <label for="supplier">Supplier</label>
        <input
          id="supplier"
          type="text"
          [(ngModel)]="formData.supplier"
          name="supplier"
          placeholder="Supplier name"
        />
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving">
        {{ saving ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
      </button>
    </div>
  </form>
</div>
