apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-service-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: inventory-platform
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Cognition-Partner-Workshops/uc-framework-upgrade-monolith-to-microservices.git
    targetRevision: workshop-Gagan
    path: inventory-service/helm/inventory-service
    helm:
      valueFiles:
        - ../../argocd/staging/values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: inventory-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
