replicaCount: 1

image:
  tag: "dev-latest"

ingress:
  enabled: true
  hosts:
    - host: inventory-dev.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: inventory-dev-tls
      hosts:
        - inventory-dev.example.com

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false

env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Development"
  - name: ASPNETCORE_URLS
    value: "http://+:8080"
  - name: Logging__LogLevel__Default
    value: "Debug"

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 1433
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53

serviceMonitor:
  enabled: true
  interval: 15s
