server.port=8082

spring.datasource.url=jdbc:sqlite:dev.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

image.default=https://static.productionready.io/images/smiley-cyrus.jpg

# User Service URL for inter-service communication
user-service.url=http://localhost:8081

mybatis.configuration.cache-enabled=true
mybatis.configuration.default-statement-timeout=3000
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-generated-keys=true
mybatis.type-handlers-package=io.spring.article.infrastructure.mybatis
mybatis.mapper-locations=mapper/*.xml

logging.level.io.spring.article.infrastructure.mybatis.readservice.ArticleReadService=DEBUG
logging.level.io.spring.article.infrastructure.mybatis.mapper=DEBUG
